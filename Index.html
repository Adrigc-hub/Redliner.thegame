<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redliner Clone - Mega Script</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: monospace; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: #00ffcc; font-size: 20px;
            pointer-events: none; text-shadow: 2px 2px 0px #000;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: red; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; background: rgba(0,0,0,0.7); padding: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ui">Salud: 100 | <span id="npc-hp">Vida NPC: 3</span></div>
    <div id="crosshair"></div>
    <div id="instructions">
        <h2>Click para Jugar</h2>
        <p>WASD = Moverse | ESPACIO = Saltar</p>
        <p>SHIFT = Dash | CLICK = Disparar</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. CONFIGURACIÓN BÁSICA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // Tema oscuro neón
        scene.fog = new THREE.Fog(0x111122, 0, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true; 
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        // Luces
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        light.position.set(0, 20, 0);
        scene.add(light);

        // 2. MUNDO (Suelo y Obstáculos)
        const gridHelper = new THREE.GridHelper(200, 100, 0x00ffcc, 0x444444);
        scene.add(gridHelper);

        const solidMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const boxes = [];
        for (let i = 0; i < 20; i++) {
            const boxGeo = new THREE.BoxGeometry(5, Math.random() * 10 + 2, 5);
            const box = new THREE.Mesh(boxGeo, solidMaterial);
            box.position.set((Math.random() - 0.5) * 100, boxGeo.parameters.height / 2, (Math.random() - 0.5) * 100);
            scene.add(box);
            boxes.push(box);
        }

        // 3. CONTROLES Y FÍSICAS DEL JUGADOR
        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => instructions.style.display = 'none');
        controls.addEventListener('unlock', () => instructions.style.display = 'block');

        // Variables de físicas
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false;
        let isDashing = false;

        document.addEventListener('keydown', (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump) velocity.y += 20; canJump = false; break;
                case 'ShiftLeft': 
                    if (!isDashing) {
                        isDashing = true;
                        velocity.z -= 150; // Impulso masivo hacia adelante
                        setTimeout(() => isDashing = false, 500); // Cooldown del dash
                    }
                    break;
            }
        });

        document.addEventListener('keyup', (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });

        // 4. SISTEMA DE NPC Y COMBATE
        class EnemyNPC {
            constructor() {
                this.hp = 3;
                const geo = new THREE.BoxGeometry(2, 4, 2);
                const mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                this.mesh = new THREE.Mesh(geo, mat);
                this.spawn();
                scene.add(this.mesh);
            }

            spawn() {
                this.hp = 3;
                this.mesh.position.set((Math.random() - 0.5) * 40, 2, (Math.random() - 0.5) * 40);
                document.getElementById('npc-hp').innerText = `Vida NPC: ${this.hp}`;
                this.mesh.material.color.setHex(0xff0000);
            }

            takeDamage() {
                this.hp -= 1;
                document.getElementById('npc-hp').innerText = `Vida NPC: ${this.hp}`;
                this.mesh.material.color.setHex(0xffffff); // Parpadeo blanco
                setTimeout(() => this.mesh.material.color.setHex(0xff0000), 100);

                if (this.hp <= 0) {
                    this.spawn(); // Reaparece si muere
                }
            }

            update(playerPos, delta) {
                // Perseguir al jugador
                const dir = new THREE.Vector3().subVectors(playerPos, this.mesh.position);
                dir.y = 0; 
                if (dir.length() > 3) {
                    dir.normalize();
                    this.mesh.position.addScaledVector(dir, 4 * delta); // Velocidad del bot
                }
            }
        }

        const bot = new EnemyNPC();

        // Disparar (Raycasting)
        const raycaster = new THREE.Raycaster();
        document.addEventListener('mousedown', (event) => {
            if (controls.isLocked) {
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera); // Disparar al centro
                const intersects = raycaster.intersectObject(bot.mesh);
                if (intersects.length > 0) {
                    bot.takeDamage();
                }
            }
        });

        // 5. BUCLE PRINCIPAL (Game Loop)
        let prevTime = performance.now();
        camera.position.y = 3;

        renderer.setAnimationLoop(() => {
            const time = performance.now();
            if (controls.isLocked === true) {
                const delta = (time - prevTime) / 1000;

                // Fricción y Gravedad
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 6.0 * delta; // Gravedad 

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                // Aceleración
                const speed = 100.0;
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                camera.position.y += velocity.y * delta;

                // Colisión con el suelo
                if (camera.position.y < 3) {
                    velocity.y = 0;
                    camera.position.y = 3;
                    canJump = true;
                }

                // Actualizar IA
                bot.update(camera.position, delta);
            }
            prevTime = time;
            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
